# Animatics SmartMotor servo controller driver, ported from epics-modules/motor
# motorSmartMotor (drvSmartMotor.cc + devSmartMotor.cc). Pure serial ASCII
# protocol — no vendor library, so this crate builds/tests on any host.

[package]
name = "motor-smartmotor"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
epics-rs = { workspace = true, features = ["asyn", "motor"] }
motor-common = { path = "../common" }

# Faulhaber MCDC2805 DC servo motor controller driver, ported from
# epics-modules/motor motorFaulhaber (drvMCDC2805.cc + devMCDC2805.cc). Pure
# serial ASCII protocol — no vendor library, so this crate builds/tests on any
# host.

[package]
name = "motor-faulhaber"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
epics-rs = { workspace = true, features = ["asyn", "motor"] }
motor-common = { path = "../common" }

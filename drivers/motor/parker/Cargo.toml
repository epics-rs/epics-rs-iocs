# Parker motor controller drivers, ported from epics-modules/motor motorParker.
# The OEM750 series (ported here) speaks a plain ASCII protocol over an asyn
# octet port — no vendor library, so this crate builds on any host.

[package]
name = "motor-parker"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
epics-rs = { workspace = true, features = ["asyn", "motor"] }
motor-common = { path = "../common" }

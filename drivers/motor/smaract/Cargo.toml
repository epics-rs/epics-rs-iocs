# SmarAct MCS2 (and, later, SCU/MCS) piezo-stepper controller driver, ported
# from epics-modules/motor motorSmarAct. The MCS2 is a pure ASCII SCPI protocol
# over an asyn octet port — no vendor library, so this crate builds on any host.

[package]
name = "motor-smaract"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
epics-rs = { workspace = true, features = ["asyn", "motor"] }
motor-common = { path = "../common" }

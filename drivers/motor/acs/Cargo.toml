# ACS MCB-4B stepper motor controller driver, ported from epics-modules/motor
# motorAcs (MCB4BDriver.cpp — the asyn model-3 asynMotorController/asynMotorAxis
# driver). Pure serial ASCII protocol — no vendor library, so this crate
# builds/tests on any host.

[package]
name = "motor-acs"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
epics-rs = { workspace = true, features = ["asyn", "motor"] }
motor-common = { path = "../common" }

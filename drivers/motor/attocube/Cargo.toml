# attocube systems ANC150 piezo stepper driver, ported from
# epics-modules/motor motorAttocube (drvANC150Asyn.cc). Pure serial ASCII
# protocol — no vendor library, so this crate builds and tests on any host.

[package]
name = "motor-attocube"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
epics-rs = { workspace = true, features = ["asyn", "motor"] }
motor-common = { path = "../common" }

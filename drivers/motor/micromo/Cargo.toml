# MicroMo MVP 2001 motion controller driver, ported from epics-modules/motor
# motorMicroMo (MVP2001Driver.cpp, the model-3 form). Pure serial ASCII protocol
# — no vendor library, so this crate builds/tests on any host.

[package]
name = "motor-micromo"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
epics-rs = { workspace = true, features = ["asyn", "motor"] }
motor-common = { path = "../common" }

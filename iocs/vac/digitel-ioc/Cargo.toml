# Ion-pump IOC binary: the `digitel` record type + `devDigitelPump` device
# support for Perkin-Elmer Digitel 500/1500 and Gamma Vacuum MPC/QPC
# controllers over an asyn serial (or IP) octet port. Exposes CA + PVA. No
# vendor library.

[package]
name = "digitel-ioc"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
vac = { path = "../../../drivers/vac" }
epics-rs = { workspace = true, features = ["asyn", "bridge"] }

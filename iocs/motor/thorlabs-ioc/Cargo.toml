# ThorLabs MDT693/694/695 piezo motor IOC binary. Wires the motor-thorlabs
# driver to a serial octet port (drvAsynSerialPortConfigure) and one motor
# record per channel, exposing CA + PVA. No vendor library — builds on any host.

[package]
name = "thorlabs-ioc"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
motor-thorlabs = { path = "../../../drivers/motor/thorlabs" }
motor-common = { path = "../../../drivers/motor/common" }
epics-rs = { workspace = true, features = ["asyn", "motor", "bridge"] }

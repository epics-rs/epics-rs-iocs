[package]
name = "xps-ioc"
version = "0.1.0"
edition = "2024"
publish = false

# Newport XPS motion controller IOC binary. Wires the motor-newport XPS driver
# to TCP octet sockets (drvAsynIPPortConfigure) and one motor record per axis.
# The XPS vendor protocol is text RPC, so no vendor library is needed — builds
# on any host.

[dependencies]
motor-newport = { path = "../../../drivers/motor/newport" }
epics-rs = { workspace = true, features = ["asyn", "motor", "bridge"] }

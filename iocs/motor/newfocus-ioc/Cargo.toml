# Newport New Focus PMNC 8750/8752 picomotor IOC binary. Wires the
# motor-newport PMNC driver to a TCP octet port (drvAsynIPPortConfigure) and
# one motor record per discovered channel, exposing CA + PVA. No vendor
# library — builds on any host.

[package]
name = "newfocus-ioc"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
motor-newport = { path = "../../../drivers/motor/newport" }
epics-rs = { workspace = true, features = ["asyn", "motor", "bridge"] }

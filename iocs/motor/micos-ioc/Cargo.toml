# Micos SMC corvus motor IOC binary. Wires the motor-micos driver to an asyn
# octet port and one motor record per axis, exposing CA + PVA. No vendor library
# — builds on any host.

[package]
name = "micos-ioc"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
motor-micos = { path = "../../../drivers/motor/micos" }
motor-common = { path = "../../../drivers/motor/common" }
epics-rs = { workspace = true, features = ["asyn", "motor", "bridge"] }

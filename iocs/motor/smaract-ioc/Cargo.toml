# SmarAct MCS2 motor IOC binary. Wires the motor-smaract MCS2 driver to an asyn
# IP octet port (drvAsynIPPortConfigure) and one motor record per channel,
# exposing CA + PVA. No vendor library — builds on any host.

[package]
name = "smaract-ioc"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
motor-smaract = { path = "../../../drivers/motor/smaract" }
motor-common = { path = "../../../drivers/motor/common" }
epics-rs = { workspace = true, features = ["asyn", "motor", "bridge"] }

# PI legacy motor IOC binary. Wires the motor-pi driver (C-862/C-863 so far)
# to a serial/TCP octet port and one motor record per axis, exposing CA + PVA.
# No vendor SDK — builds on any host.

[package]
name = "pi-ioc"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
motor-pi = { path = "../../../drivers/motor/pi" }
motor-common = { path = "../../../drivers/motor/common" }
epics-rs = { workspace = true, features = ["asyn", "motor", "bridge"] }

# AMCI ANF2/ANG1 stepper motor IOC binary. Wires up a Modbus/TCP link
# (drvAsynIPPortConfigure + modbusInterposeConfig + drvModbusAsynConfigure) and
# the motor-amci ANF2/ANG1 iocsh commands, exposing CA + PVA. No vendor
# library — builds on any host with network access to the controller.

[package]
name = "amci-ioc"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
motor-amci = { path = "../../../drivers/motor/amci" }
motor-common = { path = "../../../drivers/motor/common" }
epics-rs = { workspace = true, features = ["asyn", "motor", "bridge"] }
modbus-rs = { workspace = true, features = ["ioc"] }

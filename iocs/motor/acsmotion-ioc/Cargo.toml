# ACS SPiiPlus motor IOC binary. Wires the motor-acsmotion driver to a
# serial/TCP octet port and one motor record per axis, exposing CA + PVA. No
# vendor library — builds on any host.

[package]
name = "acsmotion-ioc"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
motor-acsmotion = { path = "../../../drivers/motor/acsmotion" }
motor-common = { path = "../../../drivers/motor/common" }
epics-rs = { workspace = true, features = ["asyn", "motor", "bridge"] }

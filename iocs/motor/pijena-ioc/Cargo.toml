# piezosystem jena E-516 (PIJEDS) motor IOC binary. Wires the motor-pijena
# driver to a serial octet port (drvAsynSerialPortConfigure) and one motor
# record per axis, exposing CA + PVA. No vendor library — builds on any host.

[package]
name = "pijena-ioc"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
motor-pijena = { path = "../../../drivers/motor/pijena" }
motor-common = { path = "../../../drivers/motor/common" }
epics-rs = { workspace = true, features = ["asyn", "motor", "bridge"] }

# Newport MM3000 motor IOC binary. Wires the motor-newport MM3000 driver to a
# serial octet port (drvAsynSerialPortConfigure) and one motor record per
# configured axis, exposing CA + PVA. No vendor library — builds on any host.

[package]
name = "mm3000-ioc"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
motor-newport = { path = "../../../drivers/motor/newport" }
epics-rs = { workspace = true, features = ["asyn", "motor", "bridge"] }

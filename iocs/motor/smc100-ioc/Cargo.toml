[package]
name = "smc100-ioc"
version = "0.1.0"
edition = "2024"
publish = false

# Newport SMC100 motor IOC binary. Wires the motor-newport driver to a serial
# octet port (drvAsynSerialPortConfigure) and the motor record, exposing CA +
# PVA. No vendor library — builds on any host.

[dependencies]
motor-newport = { path = "../../../drivers/motor/newport" }
epics-rs = { workspace = true, features = ["asyn", "motor", "bridge"] }

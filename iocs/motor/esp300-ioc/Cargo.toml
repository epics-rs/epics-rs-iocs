# Newport ESP100/ESP300/ESP301 motor IOC binary. Wires the motor-newport
# ESP300 driver to a serial octet port (drvAsynSerialPortConfigure) and one
# motor record per discovered axis, exposing CA + PVA. No vendor library —
# builds on any host.

[package]
name = "esp300-ioc"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
motor-newport = { path = "../../../drivers/motor/newport" }
epics-rs = { workspace = true, features = ["asyn", "motor", "bridge"] }

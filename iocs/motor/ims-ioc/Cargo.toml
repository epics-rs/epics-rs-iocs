# IMS MDrivePlus motor IOC binary. Wires the motor-ims driver to an asyn octet
# port and one motor record per controller (single axis), exposing CA + PVA. No
# vendor library — builds on any host.

[package]
name = "ims-ioc"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
motor-ims = { path = "../../../drivers/motor/ims" }
motor-common = { path = "../../../drivers/motor/common" }
epics-rs = { workspace = true, features = ["asyn", "motor", "bridge"] }

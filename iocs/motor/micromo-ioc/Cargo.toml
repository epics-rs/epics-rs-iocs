# MicroMo MVP 2001 motor IOC binary. Wires the motor-micromo driver to a serial
# octet port (drvAsynSerialPortConfigure) and one motor record per axis,
# exposing CA + PVA. No vendor library — builds on any host.

[package]
name = "micromo-ioc"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
motor-micromo = { path = "../../../drivers/motor/micromo" }
motor-common = { path = "../../../drivers/motor/common" }
epics-rs = { workspace = true, features = ["asyn", "motor", "bridge"] }

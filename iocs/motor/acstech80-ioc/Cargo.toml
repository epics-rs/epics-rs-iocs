# ACS Tech80 SPiiPlus motor IOC binary. Wires the motor-acstech80 driver to a
# serial/TCP octet port and one motor record per auto-detected axis, exposing
# CA + PVA. No vendor library — builds on any host.

[package]
name = "acstech80-ioc"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
motor-acstech80 = { path = "../../../drivers/motor/acstech80" }
motor-common = { path = "../../../drivers/motor/common" }
epics-rs = { workspace = true, features = ["asyn", "motor", "bridge"] }

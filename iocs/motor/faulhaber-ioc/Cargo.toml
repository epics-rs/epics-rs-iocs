# Faulhaber MCDC2805 motor IOC binary. Wires the motor-faulhaber driver to a
# serial octet port (drvAsynSerialPortConfigure) and one motor record per node,
# exposing CA + PVA. No vendor library — builds on any host.

[package]
name = "faulhaber-ioc"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
motor-faulhaber = { path = "../../../drivers/motor/faulhaber" }
motor-common = { path = "../../../drivers/motor/common" }
epics-rs = { workspace = true, features = ["asyn", "motor", "bridge"] }

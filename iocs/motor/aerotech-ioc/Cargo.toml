# Aerotech Ensemble motor IOC binary. Wires the motor-aerotech driver to an asyn
# octet port and one motor record per axis, exposing CA + PVA. No vendor library
# — builds on any host.

[package]
name = "aerotech-ioc"
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
motor-aerotech = { path = "../../../drivers/motor/aerotech" }
motor-common = { path = "../../../drivers/motor/common" }
epics-rs = { workspace = true, features = ["asyn", "motor", "bridge"] }

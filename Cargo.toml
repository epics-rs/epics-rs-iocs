# Single source of truth for the epics-rs crate versions every driver/IOC
# consumes. Bump here once per epics-rs release instead of editing each crate.
# Per-crate feature sets stay in the crates (features are additive over these).
[workspace.dependencies]
# Local path dependency on the epics-rs library workspace (sibling checkout).
# Switched from the published 0.21.0 crate to consume in-progress framework
# changes (motor-rs profile/PCO/gathering extensions) needed for XPS full parity.
epics-rs = { path = "../epics-rs/crates/epics-rs" }
asyn-rs = { version = "0.21.0" }
ad-plugins-rs = { version = "0.21.0" }

[workspace]
resolver = "3"
members = [
    "drivers/d435i",
    "drivers/uldaq-sys",
    "drivers/meascomp",
    "drivers/usb-ctr",
    "drivers/usb-2408",
    "iocs/d435i-ioc",
    "iocs/usb-ctr-ioc",
    "iocs/usb-2408-ioc",
]

[patch."https://github.com/epics-rs/epics-rs.git"]
epics-rs = { path = "../epics-rs/crates/epics-rs" }
asyn-rs = { path = "../epics-rs/crates/asyn-rs" }
ad-plugins-rs = { path = "../epics-rs/crates/ad-plugins-rs" }
epics-base-rs = { path = "../epics-rs/crates/epics-base-rs" }
epics-ca-rs = { path = "../epics-rs/crates/epics-ca-rs" }
epics-pva-rs = { path = "../epics-rs/crates/epics-pva-rs" }
epics-bridge-rs = { path = "../epics-rs/crates/epics-bridge-rs" }
ad-core-rs = { path = "../epics-rs/crates/ad-core-rs" }
epics-macros-rs = { path = "../epics-rs/crates/epics-macros-rs" }

[patch.crates-io]
spvirit-server = { git = "https://github.com/ISISNeutronMuon/spvirit.git", rev = "5af368efda9cdea5e4946af5d4157d2cf5645edd" }
spvirit-codec  = { git = "https://github.com/ISISNeutronMuon/spvirit.git", rev = "5af368efda9cdea5e4946af5d4157d2cf5645edd" }
spvirit-types  = { git = "https://github.com/ISISNeutronMuon/spvirit.git", rev = "5af368efda9cdea5e4946af5d4157d2cf5645edd" }
spvirit-client = { git = "https://github.com/ISISNeutronMuon/spvirit.git", rev = "5af368efda9cdea5e4946af5d4157d2cf5645edd" }
spvirit-tools  = { git = "https://github.com/ISISNeutronMuon/spvirit.git", rev = "5af368efda9cdea5e4946af5d4157d2cf5645edd" }

# Single source of truth for the epics-rs crate versions every driver/IOC
# consumes. Bump here once per epics-rs release instead of editing each crate.
# Per-crate feature sets stay in the crates (features are additive over these).
[workspace.dependencies]
# Published epics-rs release from crates.io. The sibling checkout keeps
# moving, so ports are baselined against the released crate, not the path dep.
epics-rs = { version = "0.22.1" }
asyn-rs = { version = "0.22.1" }
ad-core-rs = { version = "0.22.1" }
ad-plugins-rs = { version = "0.22.1" }
# Modbus TCP/RTU/ASCII driver (drvModbusAsyn port).
modbus-rs = { version = "0.22.1", package = "epics-modbus-rs" }

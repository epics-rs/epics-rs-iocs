[package]
name = "d435i"
version = "0.1.0"
edition = "2024"
publish = false

[workspace]

[features]
ioc = ["dep:tokio", "epics-rs/ioc"]

[dependencies]
epics-rs = { git = "https://github.com/epics-rs/epics-rs.git", branch = "main", features = ["asyn", "ad"] }
parking_lot = "0.12"
tokio = { version = "1", features = ["full"], optional = true }
realsense-rust = "1.3"
anyhow = "1.0"
log = "0.4"

[[bin]]
name = "d435i_ioc"
path = "src/bin/d435i_ioc.rs"
required-features = ["ioc"]
